<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forkcast — Find Restaurants</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">Fork<span>cast</span></div>
    </header>

    <section class="hero">
      <h1>Find great restaurants<br /><em>anywhere</em></h1>
      <p>Enter a city to discover top-rated dining spots near you.</p>
      <div class="search-bar">
        <input
          type="text"
          id="cityInput"
          placeholder="e.g. New York, Tokyo, London..."
          autocomplete="off"
        />
        <select id="limitSelect">
          <option value="10">10 results</option>
          <option value="20" selected>20 results</option>
          <option value="30">30 results</option>
          <option value="40">40 results</option>
          <option value="50">50 results</option>
        </select>
        <button id="searchBtn">Search</button>
      </div>
    </section>

    <main class="content">
      <div id="app">
        <div class="state-box">
          <div class="icon">🍽️</div>
          <h3>Search for a city above</h3>
          <p>We'll show you the top-rated restaurants in any city worldwide.</p>
        </div>
      </div>
    </main>

    <footer>&copy; 2026 Forkcast</footer>

    <!-- Load order matters: API → UI → App (controller) -->
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
